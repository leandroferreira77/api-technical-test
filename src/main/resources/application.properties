spring.application.name=biblioteca-api

server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/biblioteca
spring.data.mongodb.auto-index-creation=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Cache
spring.cache.type=redis

# JWT - secret deve ser Base64 de pelo menos 32 bytes para HS256
jwt.secret=bXlTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25JbkJhc2U2NEZvcm1hdA==
jwt.expiration=86400000

# SpringDoc / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# Logging
#logging.level.br.com.sicredi=DEBUG
logging.level.br.com.cliqueresolve=TRACE
logging.level.root=INFO
